<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Village - Ek Se Sreshtha</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../css/variables.css">
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/components.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/constituency.css">
</head>
<body>

    <div id="app-shell">

        <!-- Page header -->
        <div class="page-header">
            <div class="page-header-info">
                <h1>Villages</h1>
                <p>Individual villages mapped to their panchayats.</p>
            </div>
            <button class="btn btn-primary" onclick="openModal('village-modal')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Add Village
            </button>
        </div>

        <!-- Data card -->
        <div class="card">
            <div class="card-header">
                <div class="search-bar">
                    <span class="search-bar-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    </span>
                    <input type="text" id="village-search" placeholder="Search villages...">
                </div>
                <div class="record-count">
                    <span id="record-count">0</span> villages
                </div>
            </div>
            <div class="card-body" style="padding: 0;">
                <div class="table-wrapper" style="border-radius: 0; border: none;">
                    <table class="table">
                        <thead>
                            <tr>
                                <th style="width: 60px;">#</th>
                                <th>Village</th>
                                <th>Panchayat</th>
                                <th>Vidhan Sabha</th>
                                <th>District</th>
                                <th>Created</th>
                                <th style="width: 120px;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="village-tbody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================================
         ADD / EDIT VILLAGE MODAL
         Uses 3-level cascading dropdowns
         (District → Vidhan Sabha → Panchayat)
         ============================================================ -->
    <div class="modal-backdrop" id="village-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="village-modal-title">Add Village</h3>
                <button class="modal-close" onclick="closeModal('village-modal')" aria-label="Close">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>

            <form id="village-form">
                <div class="modal-body">

                    <!-- Village name -->
                    <div class="form-group">
                        <label for="village-name" class="form-label">
                            Village name <span class="required">*</span>
                        </label>
                        <input
                            type="text"
                            id="village-name"
                            class="form-input"
                            placeholder="e.g. Ugra Kheri"
                            required
                        >
                    </div>

                    <!-- Cascading dropdowns -->
                    <div class="form-group">
                        <label for="village-district" class="form-label">
                            District <span class="required">*</span>
                        </label>
                        <select id="village-district" class="form-select" required onchange="onVillageDistrictChange()">
                            <option value="">Select district</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="village-vs" class="form-label">
                            Vidhan Sabha <span class="required">*</span>
                        </label>
                        <select id="village-vs" class="form-select" required disabled onchange="onVillageVsChange()">
                            <option value="">Select Vidhan Sabha</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="village-panchayat" class="form-label">
                            Panchayat <span class="required">*</span>
                        </label>
                        <select id="village-panchayat" class="form-select" required disabled>
                            <option value="">Select Panchayat</option>
                        </select>
                        <span class="form-hint">All three parent levels are required.</span>
                    </div>

                    <input type="hidden" id="village-editing-id">
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('village-modal')">
                        Cancel
                    </button>
                    <button type="submit" class="btn btn-primary">
                        Save Village
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../js/common.js"></script>
    <script src="../../js/sidebar.js"></script>
    <script src="../../js/village.js"></script>
</body>
</html>
