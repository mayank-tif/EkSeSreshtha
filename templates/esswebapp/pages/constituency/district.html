<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Districts - Ek Se Sreshtha</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Global styles -->
    <link rel="stylesheet" href="../../css/variables.css">
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/components.css">
    <link rel="stylesheet" href="../../css/layout.css">

    <!-- Page-specific styles -->
    <link rel="stylesheet" href="../../css/constituency.css">
</head>
<body>

    <!-- The sidebar script wraps this content in the app shell -->
    <div id="app-shell">

        <!-- ========================================================
             PAGE HEADER - Title and "Add District" button
             ======================================================== -->
        <div class="page-header">
            <div class="page-header-info">
                <h1>Districts</h1>
                <p>Manage all districts where Ek Se Sreshtha operates.</p>
            </div>
            <button class="btn btn-primary" onclick="openModal('district-modal')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Add District
            </button>
        </div>

        <!-- ========================================================
             DATA CARD - Search + table of districts
             ======================================================== -->
        <div class="card">
            <div class="card-header">
                <!-- Search input to filter the table live -->
                <div class="search-bar">
                    <span class="search-bar-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    </span>
                    <input type="text" id="district-search" placeholder="Search districts...">
                </div>
                <div class="record-count">
                    <span id="record-count">0</span> districts
                </div>
            </div>
            <div class="card-body" style="padding: 0;">
                <div class="table-wrapper" style="border-radius: 0; border: none;">
                    <table class="table">
                        <thead>
                            <tr>
                                <th style="width: 60px;">#</th>
                                <th>District Name</th>
                                <th>Vidhan Sabhas</th>
                                <th>Panchayats</th>
                                <th>Created On</th>
                                <th style="width: 120px;">Actions</th>
                            </tr>
                        </thead>
                        <!-- District rows rendered by district.js -->
                        <tbody id="district-tbody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================================
         ADD / EDIT DISTRICT MODAL
         Used for both create and edit flows - editingId
         determines which mode we're in.
         ============================================================ -->
    <div class="modal-backdrop" id="district-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="district-modal-title">Add District</h3>
                <button class="modal-close" onclick="closeModal('district-modal')" aria-label="Close">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>

            <form id="district-form">
                <div class="modal-body">

                    <!-- The one and only field - district name -->
                    <div class="form-group">
                        <label for="district-name" class="form-label">
                            District name <span class="required">*</span>
                        </label>
                        <input
                            type="text"
                            id="district-name"
                            class="form-input"
                            placeholder="e.g. Panipat"
                            required
                        >
                        <span class="form-hint">Enter the full official district name.</span>
                    </div>

                    <!-- Hidden field tracks whether this is an edit -->
                    <input type="hidden" id="district-editing-id">
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('district-modal')">
                        Cancel
                    </button>
                    <button type="submit" class="btn btn-primary">
                        Save District
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../../js/common.js"></script>
    <script src="../../js/sidebar.js"></script>
    <script src="../../js/district.js"></script>
</body>
</html>
