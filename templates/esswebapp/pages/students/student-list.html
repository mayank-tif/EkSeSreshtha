<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - Ek Se Sreshtha</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Stylesheets: tokens -> base -> components -> layout -> page -->
    <link rel="stylesheet" href="../../css/variables.css">
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/components.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/students.css">
    <link rel="stylesheet" href="../../css/attendance.css">
</head>
<body>

    <!-- ============================================================
         APP SHELL
         ============================================================ -->
    <div id="app-shell">

        <!-- ============================================================
             PAGE HEADER
             Title on the left, "Add Student" button on the top right.
             The button opens the registration form page.
             ============================================================ -->
        <div class="page-header">
            <div class="page-header-info">
                <h1>Student Registration</h1>
                <p>All registered students. Use filters to narrow down by area.</p>
            </div>
            <a href="student-registration.html" class="btn btn-primary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 5v14M5 12h14"/>
                </svg>
                Add Student
            </a>
        </div>

        <!-- ============================================================
             TOP ROW: SEARCH (left) + LOCATION FILTERS (right) + COUNT
             District -> Vidhan Sabha -> Panchayat -> Village cascade.
             The count pill on the right updates with every selection.
             ============================================================ -->
        <div class="card filter-card">
            <div class="card-body">
                <div class="toolbar-row">
                    <!-- Left: free-text search -->
                    <div class="toolbar-search">
                        <svg class="toolbar-search-icon" width="16" height="16" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor" stroke-width="2"
                             stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
                        </svg>
                        <input type="text" class="form-input" id="student-search"
                               placeholder="Search name / roll no / father..."
                               oninput="renderStudentListTable()">
                    </div>

                    <!-- Right: cascading location filters + live count -->
                    <div class="toolbar-filters">
                        <select class="form-select" id="filter-district" title="District"></select>
                        <select class="form-select" id="filter-vs" title="Vidhan Sabha"></select>
                        <select class="form-select" id="filter-panchayat" title="Panchayat"></select>
                        <select class="form-select" id="filter-village" title="Village"></select>
                        <span class="count-badge" id="student-count">0</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- ============================================================
             STUDENTS TABLE
             ============================================================ -->
        <div class="card">
            <div class="card-body">
                <div class="table-wrapper">
                    <table class="table">
                        <thead>
                            <tr>
                                <th style="width:110px;">Roll No</th>
                                <th>Student</th>
                                <th>Class</th>
                                <th>Centre</th>
                                <th>Contact</th>
                                <th style="width:110px;">Status</th>
                                <th style="width:150px;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="student-table-body">
                            <!-- Rows injected by student-list.js -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <!-- ============================================================
         STUDENT PROFILE MODAL (eye icon)
         ============================================================ -->
    <div class="modal-backdrop" id="student-modal" onclick="closeStudentProfile(event)">
        <div class="modal modal-lg" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 class="modal-title">Student Profile</h3>
                <button type="button" class="modal-close" onclick="closeStudentProfile()">&times;</button>
            </div>
            <div class="modal-body" id="student-modal-body">
                <!-- Content injected by student-list.js -->
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeStudentProfile()">Close</button>
            </div>
        </div>
    </div>

    <!-- ============================================================
         SCRIPTS
         ============================================================ -->
    <script src="../../js/common.js"></script>
    <script src="../../js/sidebar.js"></script>
    <script src="../../js/location-filter.js"></script>
    <script src="../../js/student-list.js"></script>
</body>
</html>
