<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vidhan Sabha - Ek Se Sreshtha</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Global styles -->
    <link rel="stylesheet" href="../../css/variables.css">
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/components.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/constituency.css">
</head>
<body>

    <!-- Sidebar script wraps this in the app shell -->
    <div id="app-shell">

        <!-- Page header with Add button -->
        <div class="page-header">
            <div class="page-header-info">
                <h1>Vidhan Sabha</h1>
                <p>Assembly constituencies mapped to their districts.</p>
            </div>
            <button class="btn btn-primary" onclick="openModal('vs-modal')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Add Vidhan Sabha
            </button>
        </div>

        <!-- Data card: search + table -->
        <div class="card">
            <div class="card-header">
                <div class="search-bar">
                    <span class="search-bar-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    </span>
                    <input type="text" id="vs-search" placeholder="Search Vidhan Sabhas...">
                </div>
                <div class="record-count">
                    <span id="record-count">0</span> constituencies
                </div>
            </div>
            <div class="card-body" style="padding: 0;">
                <div class="table-wrapper" style="border-radius: 0; border: none;">
                    <table class="table">
                        <thead>
                            <tr>
                                <th style="width: 60px;">#</th>
                                <th>Vidhan Sabha</th>
                                <th>District</th>
                                <th>Panchayats</th>
                                <th>Created</th>
                                <th style="width: 120px;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="vs-tbody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================================
         ADD / EDIT VIDHAN SABHA MODAL
         ============================================================ -->
    <div class="modal-backdrop" id="vs-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="vs-modal-title">Add Vidhan Sabha</h3>
                <button class="modal-close" onclick="closeModal('vs-modal')" aria-label="Close">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>

            <form id="vs-form">
                <div class="modal-body">

                    <!-- Field: Vidhan Sabha name -->
                    <div class="form-group">
                        <label for="vs-name" class="form-label">
                            Vidhan Sabha name <span class="required">*</span>
                        </label>
                        <input
                            type="text"
                            id="vs-name"
                            class="form-input"
                            placeholder="e.g. Panipat Rural"
                            required
                        >
                    </div>

                    <!-- Field: District dropdown (populated from stored data) -->
                    <div class="form-group">
                        <label for="vs-district" class="form-label">
                            Parent district <span class="required">*</span>
                        </label>
                        <select id="vs-district" class="form-select" required>
                            <option value="">Select a district</option>
                        </select>
                        <span class="form-hint">Choose which district this constituency belongs to.</span>
                    </div>

                    <input type="hidden" id="vs-editing-id">
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('vs-modal')">
                        Cancel
                    </button>
                    <button type="submit" class="btn btn-primary">
                        Save Vidhan Sabha
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../js/common.js"></script>
    <script src="../../js/sidebar.js"></script>
    <script src="../../js/vidhan-sabha.js"></script>
</body>
</html>
