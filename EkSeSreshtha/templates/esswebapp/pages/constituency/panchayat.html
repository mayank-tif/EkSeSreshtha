<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panchayat - Ek Se Sreshtha</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../css/variables.css">
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/components.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/constituency.css">
</head>
<body>

    <div id="app-shell">

        <!-- Page header -->
        <div class="page-header">
            <div class="page-header-info">
                <h1>Panchayat</h1>
                <p>Village-level self-governance units mapped to their Vidhan Sabhas.</p>
            </div>
            <button class="btn btn-primary" onclick="openModal('panchayat-modal')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Add Panchayat
            </button>
        </div>

        <!-- Data card -->
        <div class="card">
            <div class="card-header">
                <div class="search-bar">
                    <span class="search-bar-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    </span>
                    <input type="text" id="panchayat-search" placeholder="Search panchayats...">
                </div>
                <div class="record-count">
                    <span id="record-count">0</span> panchayats
                </div>
            </div>
            <div class="card-body" style="padding: 0;">
                <div class="table-wrapper" style="border-radius: 0; border: none;">
                    <table class="table">
                        <thead>
                            <tr>
                                <th style="width: 60px;">#</th>
                                <th>Panchayat</th>
                                <th>Vidhan Sabha</th>
                                <th>District</th>
                                <th>Villages</th>
                                <th>Created</th>
                                <th style="width: 120px;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="panchayat-tbody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================================
         ADD / EDIT PANCHAYAT MODAL
         ============================================================ -->
    <div class="modal-backdrop" id="panchayat-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="panchayat-modal-title">Add Panchayat</h3>
                <button class="modal-close" onclick="closeModal('panchayat-modal')" aria-label="Close">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>

            <form id="panchayat-form">
                <div class="modal-body">

                    <!-- Panchayat name -->
                    <div class="form-group">
                        <label for="panchayat-name" class="form-label">
                            Panchayat name <span class="required">*</span>
                        </label>
                        <input
                            type="text"
                            id="panchayat-name"
                            class="form-input"
                            placeholder="e.g. Bapoli"
                            required
                        >
                    </div>

                    <!-- Cascading dropdowns -->
                    <div class="form-grid-2">
                        <div class="form-group">
                            <label for="panchayat-district" class="form-label">
                                District <span class="required">*</span>
                            </label>
                            <select id="panchayat-district" class="form-select" required onchange="onPanchayatDistrictChange()">
                                <option value="">Select district</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="panchayat-vs" class="form-label">
                                Vidhan Sabha <span class="required">*</span>
                            </label>
                            <select id="panchayat-vs" class="form-select" required disabled>
                                <option value="">Select Vidhan Sabha</option>
                            </select>
                            <span class="form-hint">Choose a district first.</span>
                        </div>
                    </div>

                    <input type="hidden" id="panchayat-editing-id">
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('panchayat-modal')">
                        Cancel
                    </button>
                    <button type="submit" class="btn btn-primary">
                        Save Panchayat
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../js/common.js"></script>
    <script src="../../js/sidebar.js"></script>
    <script src="../../js/panchayat.js"></script>
</body>
</html>
