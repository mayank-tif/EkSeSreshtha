<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educational Centres - Ek Se Sreshtha</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../css/variables.css">
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/components.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/centres.css">
</head>
<body>

    <div id="app-shell">

        <!-- Page header -->
        <div class="page-header">
            <div class="page-header-info">
                <h1>Educational Centres</h1>
                <p>Physical locations where classes are held.</p>
            </div>
            <button class="btn btn-primary" onclick="openModal('centre-modal')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Add Centre
            </button>
        </div>

        <!-- Search + table -->
        <div class="card">
            <div class="card-header">
                <div class="search-bar">
                    <span class="search-bar-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    </span>
                    <input type="text" id="centre-search" placeholder="Search centres...">
                </div>
                <div class="record-count">
                    <span id="record-count">0</span> centres
                </div>
            </div>
            <div class="card-body" style="padding: 0;">
                <div class="table-wrapper" style="border-radius: 0; border: none;">
                    <table class="table">
                        <thead>
                            <tr>
                                <th style="width: 60px;">#</th>
                                <th>Centre Name</th>
                                <th>Village</th>
                                <th>Regional Admin</th>
                                <th>Assigned Teacher</th>
                                <th>Students</th>
                                <th>Started</th>
                                <th style="width: 150px;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="centre-tbody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================================
         ADD / EDIT CENTRE MODAL
         Includes location picker (with mock map coordinates)
         ============================================================ -->
    <div class="modal-backdrop" id="centre-modal">
        <div class="modal modal-lg">
            <div class="modal-header">
                <h3 class="modal-title" id="centre-modal-title">Add Educational Centre</h3>
                <button class="modal-close" onclick="closeModal('centre-modal')" aria-label="Close">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>

            <form id="centre-form">
                <div class="modal-body">

                    <!-- Centre name and date -->
                    <div class="form-grid-2">
                        <div class="form-group">
                            <label class="form-label" for="centre-name">Centre name <span class="required">*</span></label>
                            <input type="text" id="centre-name" class="form-input" placeholder="e.g. Ek Se Sreshtha Centre - Ugra Kheri" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="centre-start-date">Start date <span class="required">*</span></label>
                            <input type="date" id="centre-start-date" class="form-input" required>
                        </div>
                    </div>

                    <!-- Google Maps pin location picker (mock) -->
                    <div class="form-group">
                        <label class="form-label">Pin location on map <span class="required">*</span></label>
                        <div class="map-picker">
                            <div class="map-picker-canvas" id="map-canvas">
                                <div class="map-picker-hint">Click anywhere on the map to drop a pin</div>
                                <div class="map-picker-pin" id="map-pin" hidden>
                                    <svg width="32" height="32" viewBox="0 0 24 24" fill="var(--brand-red)"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                                </div>
                            </div>
                            <div class="map-picker-coords">
                                <div>
                                    <label class="form-label">Latitude</label>
                                    <input type="number" id="centre-lat" class="form-input" step="0.000001" placeholder="e.g. 29.3909" required>
                                </div>
                                <div>
                                    <label class="form-label">Longitude</label>
                                    <input type="number" id="centre-lng" class="form-input" step="0.000001" placeholder="e.g. 76.9635" required>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Area (4-level cascade) -->
                    <div class="form-grid-2">
                        <div class="form-group">
                            <label class="form-label" for="centre-district">District <span class="required">*</span></label>
                            <select id="centre-district" class="form-select" required onchange="onCentreDistrictChange()">
                                <option value="">Select district</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="centre-vs">Vidhan Sabha <span class="required">*</span></label>
                            <select id="centre-vs" class="form-select" required disabled onchange="onCentreVsChange()">
                                <option value="">Select Vidhan Sabha</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-grid-2">
                        <div class="form-group">
                            <label class="form-label" for="centre-panchayat">Panchayat <span class="required">*</span></label>
                            <select id="centre-panchayat" class="form-select" required disabled onchange="onCentrePanchayatChange()">
                                <option value="">Select Panchayat</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="centre-village">Village <span class="required">*</span></label>
                            <select id="centre-village" class="form-select" required disabled>
                                <option value="">Select Village</option>
                            </select>
                        </div>
                    </div>

                    <!-- Staff assignment -->
                    <div class="form-grid-2">
                        <div class="form-group">
                            <label class="form-label" for="centre-ra">Assign Regional Admin</label>
                            <select id="centre-ra" class="form-select">
                                <option value="">Select Regional Admin</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="centre-teacher">Assign Teacher</label>
                            <select id="centre-teacher" class="form-select">
                                <option value="">Select Teacher</option>
                            </select>
                        </div>
                    </div>

                    <input type="hidden" id="centre-editing-id">
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('centre-modal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Centre</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ============================================================
         VIEW CENTRE DETAILS MODAL
         Rich display of centre info + student count
         ============================================================ -->
    <div class="modal-backdrop" id="centre-view-modal">
        <div class="modal modal-lg">
            <div class="modal-header">
                <h3 class="modal-title">Centre Details</h3>
                <button class="modal-close" onclick="closeModal('centre-view-modal')" aria-label="Close">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="modal-body" id="centre-view-body">
                <!-- Rendered by educational-centre.js -->
            </div>
        </div>
    </div>

    <script src="../../js/common.js"></script>
    <script src="../../js/sidebar.js"></script>
    <script src="../../js/educational-centre.js"></script>
</body>
</html>
