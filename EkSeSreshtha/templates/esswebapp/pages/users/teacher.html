<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachers - Ek Se Sreshtha</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../css/variables.css">
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/components.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/users.css">
</head>
<body>

    <div id="app-shell">

        <div class="page-header">
            <div class="page-header-info">
                <h1>Teachers</h1>
                <p>Educators assigned to specific villages and centres.</p>
            </div>
        </div>

        <div class="users-layout">

            <!-- ==================================================
                 LEFT: TEACHER REGISTRATION FORM
                 ================================================== -->
            <div class="card">
                <div class="card-header">
                    <div>
                        <h2 class="card-title" id="teacher-form-title">Register Teacher</h2>
                        <p class="card-subtitle">Enter the teacher's personal, contact, and assignment details.</p>
                    </div>
                </div>
                <div class="card-body">
                    <form id="teacher-form">

                        <!-- Profile image -->
                        <div class="avatar-upload">
                            <div class="avatar-upload-preview" id="teacher-image-preview">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            </div>
                            <div class="avatar-upload-info">
                                <h4>Profile photo</h4>
                                <p>PNG or JPG, up to 2 MB.</p>
                                <label for="teacher-image" class="avatar-upload-btn">Choose file</label>
                                <input type="file" id="teacher-image" accept="image/png,image/jpeg">
                            </div>
                        </div>

                        <!-- Personal Info -->
                        <h3 class="section-title">Personal information</h3>

                        <div class="form-group">
                            <label class="form-label" for="teacher-name">Full name <span class="required">*</span></label>
                            <input type="text" id="teacher-name" class="form-input" placeholder="e.g. Priya Sharma" required>
                        </div>

                        <div class="form-grid-2">
                            <div class="form-group">
                                <label class="form-label" for="teacher-email">Email <span class="required">*</span></label>
                                <input type="email" id="teacher-email" class="form-input" placeholder="name@example.com" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="teacher-age">Age</label>
                                <input type="number" id="teacher-age" class="form-input" placeholder="e.g. 28" min="18" max="99">
                            </div>
                        </div>

                        <div class="form-grid-2">
                            <div class="form-group">
                                <label class="form-label" for="teacher-gender">Gender</label>
                                <select id="teacher-gender" class="form-select">
                                    <option value="">Select gender</option>
                                    <option>Male</option>
                                    <option>Female</option>
                                    <option>Other</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="teacher-dob">Date of birth</label>
                                <input type="date" id="teacher-dob" class="form-input">
                            </div>
                        </div>

                        <div class="form-grid-2">
                            <div class="form-group">
                                <label class="form-label" for="teacher-enrollment">Enrollment date</label>
                                <input type="date" id="teacher-enrollment" class="form-input">
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="teacher-qualification">Education / Qualification</label>
                                <input type="text" id="teacher-qualification" class="form-input" placeholder="e.g. B.Ed, M.A. Hindi">
                            </div>
                        </div>

                        <!-- Contact -->
                        <h3 class="section-title">Contact</h3>

                        <div class="form-grid-2">
                            <div class="form-group">
                                <label class="form-label" for="teacher-phone">Phone number <span class="required">*</span></label>
                                <input type="tel" id="teacher-phone" class="form-input" placeholder="10-digit mobile number" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="teacher-whatsapp">WhatsApp number</label>
                                <input type="tel" id="teacher-whatsapp" class="form-input" placeholder="If different from phone">
                            </div>
                        </div>

                        <!-- Guardian info (for younger teachers or single women in the field) -->
                        <h3 class="section-title">Guardian / Spouse</h3>

                        <div class="form-grid-2">
                            <div class="form-group">
                                <label class="form-label" for="teacher-guardian-name">Guardian or spouse name</label>
                                <input type="text" id="teacher-guardian-name" class="form-input" placeholder="e.g. Ramesh Sharma">
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="teacher-guardian-no">Guardian phone number</label>
                                <input type="tel" id="teacher-guardian-no" class="form-input" placeholder="10-digit number">
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="teacher-address">Address</label>
                            <textarea id="teacher-address" class="form-textarea" placeholder="Full residential address"></textarea>
                        </div>

                        <!-- Assignment area -->
                        <h3 class="section-title">Assignment</h3>

                        <div class="form-group">
                            <label class="form-label" for="teacher-district">District <span class="required">*</span></label>
                            <select id="teacher-district" class="form-select" required onchange="onTeacherDistrictChange()">
                                <option value="">Select district</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="teacher-vs">Vidhan Sabha <span class="required">*</span></label>
                            <select id="teacher-vs" class="form-select" required disabled onchange="onTeacherVsChange()">
                                <option value="">Select Vidhan Sabha</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="teacher-panchayat">Panchayat <span class="required">*</span></label>
                            <select id="teacher-panchayat" class="form-select" required disabled onchange="onTeacherPanchayatChange()">
                                <option value="">Select Panchayat</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="teacher-village">Village <span class="required">*</span></label>
                            <select id="teacher-village" class="form-select" required disabled>
                                <option value="">Select Village</option>
                            </select>
                        </div>

                        <!-- Security -->
                        <h3 class="section-title">Security</h3>

                        <div class="form-grid-2">
                            <div class="form-group">
                                <label class="form-label" for="teacher-password">Password <span class="required">*</span></label>
                                <input type="password" id="teacher-password" class="form-input" placeholder="At least 8 characters" required minlength="8">
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="teacher-confirm-password">Confirm password <span class="required">*</span></label>
                                <input type="password" id="teacher-confirm-password" class="form-input" placeholder="Repeat the password" required minlength="8">
                            </div>
                        </div>

                        <input type="hidden" id="teacher-editing-id">
                        <input type="hidden" id="teacher-image-data">

                        <div class="form-actions">
                            <button type="button" class="btn btn-secondary" onclick="resetTeacherForm()">Reset</button>
                            <button type="submit" class="btn btn-primary">Save Teacher</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- ==================================================
                 RIGHT: EXISTING TEACHERS LIST
                 ================================================== -->
            <div class="card">
                <div class="card-header">
                    <div>
                        <h2 class="card-title">All Teachers</h2>
                        <p class="card-subtitle" id="teacher-count-label">0 teachers registered.</p>
                    </div>
                    <div class="search-bar">
                        <input type="text" class="form-input" id="teacher-search"
                               placeholder="Search..." oninput="renderTeacherList()">
                    </div>
                </div>
                <div class="card-body" style="padding: 0;">
                    <div class="user-list" id="teacher-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../js/common.js"></script>
    <script src="../../js/sidebar.js"></script>
    <script src="../../js/teacher.js"></script>
</body>
</html>
